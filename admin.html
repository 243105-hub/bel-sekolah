<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Setting Jadwal Bel Sekolah</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .login-box, .dashboard {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h2 {
            color: #1e3c72;
            margin-bottom: 20px;
            text-align: center;
        }

        input, button, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
        }

        button {
            background: #1e3c72;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            background: #2a5298;
        }

        .info-box {
            background: #fef3c7;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            color: #92400e;
        }

        .sound-info-box {
            background: #d1fae5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            color: #065f46;
        }

        .schedule-item {
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .schedule-item select, .schedule-item input {
            flex: 1;
            margin: 0;
        }

        .schedule-item input[type="time"] {
            flex: 0.5;
        }

        .delete-btn {
            background: #ef4444;
            width: auto;
            padding: 10px 20px;
        }

        .test-sound-btn {
            background: #8b5cf6;
            margin-top: 5px;
        }

        .btn-reset {
            background: #f59e0b;
        }

        @media (max-width: 768px) {
            .schedule-item {
                flex-direction: column;
            }
            .schedule-item input, .schedule-item select {
                width: 100%;
            }
            .delete-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="loginForm" class="login-box">
        <h2>🔐 Admin Panel</h2>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="admin123">
        <button onclick="login()">Login</button>
    </div>

    <div id="dashboard" class="dashboard" style="display: none;">
        <h2>📋 Dashboard Admin</h2>
        
        <div class="info-box">
            ✅ Sistem bel aktif: Senin - Jumat<br>
        </div>

        <button class="test-sound-btn" onclick="testSound('masuk')">🔔 Test Suara Bel Masuk</button>
        <button class="test-sound-btn" onclick="testSound('istirahat')">🍽️ Test Suara Bel Istirahat</button>
        <button class="test-sound-btn" onclick="testSound('pulang')">🏠 Test Suara Bel Pulang</button>

        <h3 style="margin-top: 30px;">📅 Kelola Jadwal Bel</h3>
        <div id="scheduleList"></div>

        <button onclick="addSchedule()" style="background: #10b981;">+ Tambah Jadwal</button>
        <button onclick="saveSchedules()" style="background: #1e3c72; margin-top: 10px;">💾 Simpan Semua Perubahan</button>
        <button onclick="resetToDefault()" class="btn-reset" style="margin-top: 10px;">🔄 Reset ke Jadwal Default (Senin-Jumat)</button>
        <button onclick="logout()" style="background: #ef4444; margin-top: 20px;">🚪 Logout</button>
    </div>
</div>

<script>
    let schedules = [];

    const SOUNDS_PATH = {
        masuk: 'sounds/jam_pelajaran.mp3',
        istirahat: 'sounds/jam_istirahat.mp3',
        pulang: 'sounds/jam_pulang.mp3'
    };

    function testSound(jenis) {
        const soundUrl = SOUNDS_PATH[jenis];
        const audio = new Audio(soundUrl);
        audio.play().catch(err => {
            alert(`⚠️ Gagal memutar suara! Pastikan file ${soundUrl} sudah diupload ke folder sounds/`);
        });
    }

    function loadSchedules() {
        const stored = localStorage.getItem('schoolBellSchedule');
        if (stored) {
            schedules = JSON.parse(stored);
            console.log('Loaded schedules:', schedules);
        } else {
            resetToDefault();
        }
    }

    function renderSchedules() {
        const container = document.getElementById('scheduleList');
        if (!container) return;
        
        if (schedules.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px;">Belum ada jadwal. Klik "Tambah Jadwal"</div>';
            return;
        }
        
        let html = '';
        schedules.forEach((schedule, index) => {
            html += `
                <div class="schedule-item">
                    <input type="time" value="${schedule.waktu}" data-index="${index}" class="schedule-time-input">
                    <input type="text" value="${schedule.keterangan}" data-index="${index}" class="schedule-desc-input" placeholder="Keterangan">
                    <select data-index="${index}" class="schedule-type-input">
                        <option value="masuk" ${schedule.jenis === 'masuk' ? 'selected' : ''}>🔔 Bel Masuk</option>
                        <option value="istirahat" ${schedule.jenis === 'istirahat' ? 'selected' : ''}>🍽️ Bel Istirahat</option>
                        <option value="pulang" ${schedule.jenis === 'pulang' ? 'selected' : ''}>🏠 Bel Pulang</option>
                    </select>
                    <button class="delete-btn" onclick="deleteSchedule(${index})">Hapus</button>
                </div>
            `;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.schedule-time-input').forEach(input => {
            input.addEventListener('change', function(e) {
                const idx = parseInt(this.dataset.index);
                if (schedules[idx]) schedules[idx].waktu = this.value;
            });
        });
        
        document.querySelectorAll('.schedule-desc-input').forEach(input => {
            input.addEventListener('change', function(e) {
                const idx = parseInt(this.dataset.index);
                if (schedules[idx]) schedules[idx].keterangan = this.value;
            });
        });
        
        document.querySelectorAll('.schedule-type-input').forEach(select => {
            select.addEventListener('change', function(e) {
                const idx = parseInt(this.dataset.index);
                if (schedules[idx]) schedules[idx].jenis = this.value;
            });
        });
    }
    
    function addSchedule() {
        schedules.push({ waktu: "12:00", keterangan: "Jadwal Baru", jenis: "masuk" });
        renderSchedules();
    }
    
    function deleteSchedule(index) {
        if (confirm('Hapus jadwal ini?')) {
            schedules.splice(index, 1);
            renderSchedules();
        }
    }
    
    function saveSchedules() {
        localStorage.setItem('schoolBellSchedule', JSON.stringify(schedules));
        alert('✅ Jadwal berhasil disimpan!');
        console.log('Saved schedules:', schedules);
    }
    
    function resetToDefault() {
        if (confirm('Reset ke jadwal default? Semua perubahan akan hilang.')) {
            schedules = [
                { waktu: "06:30", keterangan: "Bel Masuk Pagi", jenis: "masuk" },
                { waktu: "07:15", keterangan: "Bel Mulai Pelajaran", jenis: "masuk" },
                { waktu: "08:45", keterangan: "Istirahat Pertama", jenis: "istirahat" },
                { waktu: "09:15", keterangan: "Masuk Setelah Istirahat", jenis: "masuk" },
                { waktu: "11:30", keterangan: "Istirahat Kedua (Sholat)", jenis: "istirahat" },
                { waktu: "12:30", keterangan: "Masuk Kembali", jenis: "masuk" },
                { waktu: "14:45", keterangan: "Bel Pulang Sekolah", jenis: "pulang" }
            ];
            renderSchedules();
            saveSchedules();
            alert('✅ Jadwal telah direset ke default!');
        }
    }
    
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        if (username === 'admin' && password === 'admin123') {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadSchedules();
            renderSchedules();
        } else {
            alert('Username atau password salah!');
        }
    }
    
    function logout() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('username').value = 'admin';
        document.getElementById('password').value = 'admin123';
    }
</script>
</body>
</html>
